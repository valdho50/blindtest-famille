<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blind Test — Joueur</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container container-narrow">
  <header class="app-header">
    <div class="app-header-icon">🎵</div>
    <div>
      <h1>Blind Test</h1>
      <p class="app-subtitle">Écran joueur</p>
    </div>
  </header>

  <div id="joinZone" class="card">
    <p class="eyebrow">Code de la partie</p>
    <input id="codeInput" maxlength="4" placeholder="ex : 4821" inputmode="numeric" />
    <p class="eyebrow">Ton pseudo</p>
    <input id="nameInput" maxlength="20" placeholder="ex : Cédric" />
    <button id="joinBtn" class="btn-primary btn-lg btn-block">Rejoindre la partie</button>
    <p id="joinError" class="error-text"></p>
  </div>

  <div id="waitZone" class="card card-center" style="display:none;">
    <div class="spinner" aria-hidden="true"></div>
    <p>Tu es bien connecté ! En attente du maître du jeu...</p>
  </div>

  <div id="questionZone" class="card" style="display:none;">
    <div id="timerDisplay" class="timer-display" style="display:none;"></div>
    <div class="phrase" id="phraseText"></div>

    <div id="libreZone" style="display:none;">
      <p class="eyebrow">Titre de la chanson</p>
      <input id="titleGuess" placeholder="Titre..." />
      <p class="eyebrow">Interprète</p>
      <input id="artistGuess" placeholder="Interprète..." />
    </div>

    <div id="qcmZone" style="display:none;">
      <p class="eyebrow">Titre de la chanson</p>
      <div id="titleOptions" class="option-grid"></div>
      <p class="eyebrow">Interprète</p>
      <div id="artistOptions" class="option-grid"></div>
    </div>

    <button id="submitBtn" class="btn-primary btn-lg btn-block">Envoyer ma réponse</button>
    <p id="submittedMsg" class="success-text" style="display:none;">✓ Réponse envoyée</p>
  </div>

  <div id="revealZone" class="card card-center" style="display:none;">
    <p class="eyebrow">La bonne réponse était</p>
    <h2 id="revealTitle"></h2>
    <p class="reveal-artist" id="revealArtist"></p>
    <p class="hint">Écoute l'extrait diffusé par le maître du jeu !</p>
  </div>

  <div class="card">
    <h3><span class="section-icon">🏆</span> Scores</h3>
    <div id="scoreboard" class="scoreboard"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let roomCode = null;

  document.getElementById('joinBtn').onclick = () => {
    const code = document.getElementById('codeInput').value.trim();
    const name = document.getElementById('nameInput').value.trim() || 'Joueur';
    if (!code) {
      document.getElementById('joinError').textContent = 'Entre un code de partie.';
      return;
    }
    socket.emit('player:join', { code, name }, (res) => {
      if (!res.ok) {
        document.getElementById('joinError').textContent = res.error;
        return;
      }
      roomCode = code;
      document.getElementById('joinZone').style.display = 'none';
      document.getElementById('waitZone').style.display = 'block';
    });
  };

  let currentMode = 'libre';
  let selectedTitle = null;
  let selectedArtist = null;

  function renderOptions(containerId, options, onSelect) {
    const el = document.getElementById(containerId);
    el.innerHTML = options.map((opt) => `<button class="option-card" data-value="${opt}"><span class="option-title">${opt}</span></button>`).join('');
    el.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => {
        el.querySelectorAll('button').forEach((b) => b.classList.remove('is-selected'));
        btn.classList.add('is-selected');
        onSelect(btn.dataset.value);
      };
    });
  }

  let timerInterval = null;

  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('timerDisplay').style.display = 'none';
  }

  function startTimer(endsAt) {
    stopTimer();
    const el = document.getElementById('timerDisplay');
    el.style.display = 'block';
    const tick = () => {
      const remaining = Math.max(0, Math.round((endsAt - Date.now()) / 1000));
      el.textContent = `⏱ ${remaining}s`;
      el.classList.toggle('timer-urgent', remaining <= 5);
      if (remaining <= 0) {
        stopTimer();
        // Temps écoulé : on envoie automatiquement ce que le joueur a saisi/sélectionné
        // jusqu'ici, s'il n'a pas déjà validé sa réponse lui-même.
        if (!document.getElementById('submitBtn').disabled) {
          submitAnswer();
          document.getElementById('submitBtn').textContent = 'Temps écoulé — réponse envoyée';
        }
      }
    };
    tick();
    timerInterval = setInterval(tick, 250);
  }

  // Envoie la réponse courante (saisie libre ou sélection QCM) au serveur.
  // Utilisée à la fois par le clic sur "Envoyer ma réponse" et par l'auto-envoi
  // déclenché quand le temps est écoulé.
  function submitAnswer() {
    let titleGuess, artistGuess;
    if (currentMode === 'qcm') {
      titleGuess = selectedTitle || '';
      artistGuess = selectedArtist || '';
    } else {
      titleGuess = document.getElementById('titleGuess').value.trim();
      artistGuess = document.getElementById('artistGuess').value.trim();
    }
    socket.emit('player:submitAnswer', { code: roomCode, titleGuess, artistGuess });
    document.getElementById('submittedMsg').style.display = 'block';
    document.getElementById('submitBtn').disabled = true;
  }

  socket.on('game:phrase', ({ phrase, mode, titleOptions, artistOptions, timerEndsAt }) => {
    document.getElementById('waitZone').style.display = 'none';
    document.getElementById('revealZone').style.display = 'none';
    document.getElementById('questionZone').style.display = 'block';
    document.getElementById('phraseText').textContent = phrase;
    document.getElementById('submittedMsg').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Envoyer ma réponse';

    currentMode = mode || 'libre';
    selectedTitle = null;
    selectedArtist = null;

    if (currentMode === 'qcm') {
      document.getElementById('libreZone').style.display = 'none';
      document.getElementById('qcmZone').style.display = 'block';
      renderOptions('titleOptions', titleOptions, (v) => { selectedTitle = v; });
      renderOptions('artistOptions', artistOptions, (v) => { selectedArtist = v; });
    } else {
      document.getElementById('qcmZone').style.display = 'none';
      document.getElementById('libreZone').style.display = 'block';
      document.getElementById('titleGuess').value = '';
      document.getElementById('artistGuess').value = '';
    }

    if (timerEndsAt) startTimer(timerEndsAt); else stopTimer();
  });

  document.getElementById('submitBtn').onclick = submitAnswer;

  socket.on('game:revealPlayers', ({ title, artist }) => {
    stopTimer();
    document.getElementById('questionZone').style.display = 'none';
    document.getElementById('revealZone').style.display = 'block';
    document.getElementById('revealTitle').textContent = title;
    document.getElementById('revealArtist').textContent = artist;
  });

  socket.on('game:scoreboard', ({ players: list }) => {
    const el = document.getElementById('scoreboard');
    const sorted = [...list].sort((a, b) => b.score - a.score);
    el.innerHTML = sorted.map((p, i) => `
      <div class="scoreboard-item${i === 0 && p.score > 0 ? ' is-leader' : ''}">
        <span class="scoreboard-rank">${i + 1}</span>
        <span class="scoreboard-name">${p.name}</span>
        <span class="scoreboard-score">${p.score} pt${p.score > 1 ? 's' : ''}</span>
      </div>
    `).join('') || 'Aucun joueur.';
  });

  socket.on('game:ended', ({ players: list }) => {
    alert('Partie terminée ! Merci d\'avoir joué 🎉');
  });

  socket.on('game:hostLeft', () => {
    alert('Le maître du jeu a quitté la partie.');
  });
</script>
</body>
</html>
