<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Réinitialiser le mot de passe — Quizz</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="host-page">
<div class="container container-narrow">
  <header class="app-header">
    <div class="brand-banner">
      <span class="brand-line1">Quizz</span>
      <span class="brand-line2">On connaît la chanson</span>
    </div>
    <p class="app-subtitle">Réinitialisation du mot de passe</p>
  </header>

  <div id="resetForm" class="card card-center">
    <p class="eyebrow">Nouveau mot de passe</p>
    <input id="newPassword" type="password" placeholder="6 caractères minimum" class="input-lg" autocomplete="new-password" />
    <p class="eyebrow">Confirmation</p>
    <input id="newPasswordConfirm" type="password" placeholder="••••••••" class="input-lg" autocomplete="new-password" />
    <button id="resetBtn" class="btn-primary btn-lg btn-block">Valider le nouveau mot de passe</button>
    <p id="resetError" class="error-text"></p>
  </div>

  <div id="resetSuccess" class="card card-center" style="display:none;">
    <p class="hint">Ton mot de passe a bien été mis à jour.</p>
    <a href="host.html" class="btn-primary btn-lg btn-block" style="text-decoration:none; display:block; box-sizing:border-box;">Se connecter</a>
  </div>

  <div id="resetInvalid" class="card card-center" style="display:none;">
    <p class="hint">Ce lien de réinitialisation est invalide ou a expiré.</p>
    <a href="host.html" class="btn-secondary btn-block" style="text-decoration:none; display:block; box-sizing:border-box;">Retour à la connexion</a>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('resetInvalid').style.display = 'block';
  }

  document.getElementById('resetBtn').onclick = async () => {
    const password = document.getElementById('newPassword').value;
    const passwordConfirm = document.getElementById('newPasswordConfirm').value;
    const errorEl = document.getElementById('resetError');
    errorEl.textContent = '';
    if (!password) {
      errorEl.textContent = 'Mot de passe requis.';
      return;
    }
    if (password.length < 6) {
      errorEl.textContent = 'Le mot de passe doit comporter au moins 6 caractères.';
      return;
    }
    if (password !== passwordConfirm) {
      errorEl.textContent = 'Les mots de passe ne correspondent pas.';
      return;
    }
    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (!data.ok) {
        errorEl.textContent = data.error || 'Réinitialisation impossible.';
        return;
      }
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('resetSuccess').style.display = 'block';
    } catch (err) {
      errorEl.textContent = 'Erreur réseau, réessaie.';
    }
  };
</script>
</body>
</html>
